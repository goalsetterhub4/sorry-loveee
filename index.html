<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Minahil</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #overlay-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            text-align: center;
            width: 100%;
            pointer-events: none;
        }

        .animated-text {
            font-size: 5rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 20px #ff3388, 0 0 30px #ff3388;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.5s ease-in-out;
            display: none;
        }

        .animated-text.show {
            display: block;
            opacity: 1;
            transform: scale(1);
        }

        /* Heart Container and Text Styling */
        .heart-container {
            display: none;
            position: relative;
            animation: pulse 1.2s infinite;
        }

        .heart-container.show {
            display: inline-block;
        }

        .heart-svg {
            width: 350px;
            height: 350px;
            filter: drop-shadow(0 0 25px #ff3388);
        }

        .heart-text {
            position: absolute;
            top: 48%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-size: 1.8rem;
            font-weight: bold;
            white-space: nowrap;
            text-shadow: 0 0 10px #ff3388, 0 0 20px #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        @media (max-width: 600px) {
            .animated-text { font-size: 3rem; }
            .heart-svg { width: 280px; height: 280px; }
            .heart-text { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>

    <div id="overlay-container">
        <div id="text-display" class="animated-text"></div>
        
        <!-- Heart Section -->
        <div id="heart-display" class="heart-container">
            <svg class="heart-svg" viewBox="0 0 32 29.6">
                <path d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,9.5,11.9,16,21.2
                c6.1-9.3,16-12.1,16-21.2C32,3.8,28.2,0,23.6,0z" fill="none" stroke="#ff3388" stroke-width="1.5" stroke-dasharray="2 1"/>
            </svg>
            <div class="heart-text">I Love You ❤️ Minahil</div>
        </div>
    </div>

    <script>
        // --- Matrix Background Setup ---
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Mix of romantic words and letters for the digital rain background
        const alphabet = "ILOVEYOUMYLOVE01💞❤️✨";
        const fontSize = 16;
        let columns = canvas.width / fontSize;
        let rainDrops = Array(Math.floor(columns)).fill(1);

        window.addEventListener('resize', () => {
            columns = canvas.width / fontSize;
            rainDrops = Array(Math.floor(columns)).fill(1);
        });

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.08)'; // Creates the trailing trail effect
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Neon pink / magenta code color matching the video
            ctx.fillStyle = '#ff3388'; 
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        }

        setInterval(drawMatrix, 33); // Smooth ~30fps rendering

        // --- Sequence Timer / Logic ---
        const textDisplay = document.getElementById('text-display');
        const heartDisplay = document.getElementById('heart-display');

        // Timings match the beat and pace of the video
        const sequence = [
            { text: "3", delay: 1000 },
            { text: "2", delay: 1000 },
            { text: "1", delay: 1000 },
            { text: "You", delay: 800 },
            { text: "Are", delay: 800 },
            { text: "My", delay: 800 },
            { text: "Love", delay: 1000 },
            { heart: true } // Final screen trigger
        ];

        let currentStep = 0;

        function runSequence() {
            if (currentStep < sequence.length) {
                const step = sequence[currentStep];

                // Hide previous text
                textDisplay.classList.remove('show');

                setTimeout(() => {
                    if (step.heart) {
                        // Display the Heart with customized text
                        heartDisplay.classList.add('show');
                    } else {
                        // Display next text item
                        textDisplay.innerText = step.text;
                        textDisplay.classList.add('show');
                        
                        currentStep++;
                        setTimeout(runSequence, step.delay);
                    }
                }, 150); // Small buffer for CSS transition reset
            }
        }

        // Starts the sequence shortly after page loads
        window.onload = () => {
            setTimeout(runSequence, 800);
        };
    </script>
</body>
</html>
